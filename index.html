<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>BeautyLab Try-On</title>
  <link rel="stylesheet" href="style.css" />

  <!-- MediaPipe Vision bundle -->
  <script
    type="module"
    src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
    crossorigin="anonymous"
  ></script>
</head>
<body>
  <div id="app">
    <video id="video" autoplay playsinline muted webkit-playsinline></video>
    <canvas id="effectCanvas"></canvas>

    <div id="labelBefore">Before</div>
    <div id="labelAfter">After</div>

    <div id="divider">
      <div id="handle"></div>
    </div>

    <div id="hint">Swipe to compare</div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
