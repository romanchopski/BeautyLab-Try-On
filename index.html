<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeautyLab Try-On</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="videoStage">
      <video id="video" autoplay playsinline muted webkit-playsinline></video>
      <canvas id="effectCanvas"></canvas>
    </div>

    <div id="labelBefore">Before</div>
    <div id="labelAfter">After</div>

    <div id="divider">
      <div id="handle"></div>
    </div>

    <div id="hint">Swipe to compare</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
