<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>BeautyLab Try-On</title>
  <link rel="stylesheet" href="style.css" />

  <script
    type="module"
    src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
    crossorigin="anonymous"
  ></script>
</head>
<body>
  <div id="app">
    <video id="video" autoplay playsinline muted webkit-playsinline></video>
    <canvas id="effectCanvas"></canvas>

    <div id="topBar">
      <div id="brandBlock">
        <div id="brandName">BeautyLab</div>
        <div id="brandSub">Soft Skin Preview</div>
      </div>

      <div id="previewBadge">AI Skin Preview</div>
    </div>

    <div id="labelBefore">Before</div>
    <div id="labelAfter">After</div>

    <div id="divider">
      <div id="handle"></div>
    </div>

    <div id="bottomCard">
      <div id="cardGlow"></div>

      <div id="cardText">
        <div id="cardTitle">Smoother-looking skin</div>
        <div id="cardDesc">
          Soft visual preview of skin improvement
        </div>
      </div>

      <div id="cardActions">
        <a
          id="learnMoreBtn"
          class="actionBtn secondary"
          href="#"
          role="button"
        >
          Learn More
        </a>

        <a
          id="visitBtn"
          class="actionBtn primary"
          href="https://www.chopskilab.com/"
          target="_blank"
          rel="noopener noreferrer"
          role="button"
        >
          Visit Website
        </a>
      </div>

      <div id="legalNote">Visual simulation</div>
    </div>

    <div id="hint">Swipe to compare</div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
